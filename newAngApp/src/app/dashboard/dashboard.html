<div class="container-fluid dashboard-container">
  <div class="row">
 
    <!-- Main content -->
    <main class="col-md-12 content">
      <h2 class="dashboard-title">Dashboard Overview</h2>
 
      <div class="row">
        <!-- Patients -->
        <div class="col-md-4">
          <div class="card stat-card text-center mb-4">
            <div class="card-body">
              <h5 class="card-title">
                <i class="bi bi-people-fill"></i> Patients
              </h5>
              <p class="card-text display-6">{{ patientCount }}</p>
            </div>
          </div>
        </div>
 
        <!-- Appointments -->
        <div class="col-md-4">
          <div class="card stat-card text-center mb-4">
            <div class="card-body">
              <h5 class="card-title">
                <i class="bi bi-calendar-check-fill"></i> Appointments
              </h5>
              <p class="card-text display-6">{{ appointmentCount }}</p>
            </div>
          </div>
        </div>
 
        <!-- Doctors -->
        <div class="col-md-4">
          <div class="card stat-card text-center mb-4">
            <div class="card-body">
              <h5 class="card-title">
                <i class="bi bi-person-badge-fill"></i> Doctors
              </h5>
              <p class="card-text display-6">{{ doctorCount }}</p>
            </div>
          </div>
        </div>
      </div>
 
    </main>
  </div>
</div>
