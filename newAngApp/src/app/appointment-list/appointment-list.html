<div class="appointments-page">

  <!-- Header -->
  <div class="page-header">
    <h2>Appointments</h2>
    <button  class="btn btn-primary" routerLink="/appointments/book" style="margin-right: 12px;">Add New Appointment</button>
    <button class="btn btn-primary"  *ngIf="role !='Patient'"   routerLink="/doctor/availability">Add Doctor Availability</button>
  </div>
  
<div *ngIf="isLoading" class="loading">
  Loading appointments...
</div>

<div *ngIf="!isLoading" >



  <!-- Card -->
  <mat-card>
    <table mat-table [dataSource]="dataSource" class="mat-elevation-z2">

      <!-- Patient -->
      <ng-container matColumnDef="patient">
        <th mat-header-cell *matHeaderCellDef> Patient </th>
        <td mat-cell *matCellDef="let a">
          {{ a.patientName }}
        </td>
      </ng-container>

       <!-- Patient -->
      <ng-container matColumnDef="doctor">
        <th mat-header-cell *matHeaderCellDef> Doctor </th>
        <td mat-cell *matCellDef="let a">
          {{ a.doctorName }}
        </td>
      </ng-container>

      <!-- Date -->
      <ng-container matColumnDef="date">
        <th mat-header-cell *matHeaderCellDef> Date </th>
        <td mat-cell *matCellDef="let a">
          {{ a.appointmentDate | date:'dd MMM yyyy' }}
        </td>
      </ng-container>

      <!-- Slot -->
      <ng-container matColumnDef="slot">
        <th mat-header-cell *matHeaderCellDef> Slot </th>
        <td mat-cell *matCellDef="let a">
          
  {{ formatTime(a.startTime) }} - {{ formatTime(a.endTime) }}

        </td>
      </ng-container>

      <!-- Status -->
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef> Status </th>
        <td mat-cell *matCellDef="let a">
          <mat-chip [ngClass]="a.status.toLowerCase()" class="status-chip" [ngClass]="getStatusClass(a.status)">
            {{ a.status }}
          </mat-chip>
        </td>
      </ng-container>

      <!-- Actions -->
     <ng-container matColumnDef="actions">
  <th mat-header-cell *matHeaderCellDef> Actions </th>

  <td mat-cell *matCellDef="let a">
    <div class="action-icons">

      <button
        mat-icon-button
        color="primary"
        matTooltip="Reschedule"
        [disabled]="a.status === 'CANCELLED'"
        (click)="openReschedule(a.appointmentId, a.doctorId)">
        <mat-icon>event</mat-icon>
      </button>

      <button
        mat-icon-button
        color="warn"
        matTooltip="Cancel"
        [disabled]="a.status === 'CANCELLED'"
        (click)="openCancel(a.appointmentId)">
        <mat-icon>close</mat-icon>
      </button>

    </div>
  </td>
</ng-container>

      <!-- Header & Row -->
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      <!-- No Data -->
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell" [attr.colspan]="displayedColumns.length">
          No records found
        </td>
      </tr>

    </table>
  </mat-card>
</div>

</div>
